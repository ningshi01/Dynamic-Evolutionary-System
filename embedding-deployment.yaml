apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: embedding-model-cache-pvc
  namespace: rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi # Adjust size based on your model cache needs
  # storageClassName: "your-storage-class" # Uncomment and specify if you have a specific storage class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-deployment
  namespace: rag
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: embedding-model-cache-pvc
      - name: dshm
        emptyDir:
          medium: Memory
      containers:
      - name: embedding-container
        image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/vllm/vllm-openai:v0.9.1
        # docker.1ms.run/vllm/vllm-openai:latest
        args: [
          "--model", "BAAI/bge-small-en-v1.5",
          "--trust-remote-code",
          "--port", "8000"
        ]
        env:
        - name: HF_ENDPOINT
          value: "https://hf-mirror.com"
        # The BGE model is public, so a token is not required and can sometimes
        # cause issues with public mirrors. We are commenting it out.
        # - name: HUGGING_FACE_HUB_TOKEN
        #   valueFrom:
        #     secretKeyRef:
        #       name: hf-token-secret
        #       key: token
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: "1" # Requesting 1 GPU
          requests:
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: cache-volume
        - mountPath: /dev/shm
          name: dshm
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: rag
spec:
  selector:
    app: embedding-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000
  type: NodePort 