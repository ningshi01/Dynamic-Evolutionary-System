apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: llm-destination
  namespace: act-test
spec:
  host: llm-service.act-test.svc.cluster.local  # 目标服务

  # ── 全局流量策略: 连接池 + 断路器 ──
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100          # TCP 最大连接数
        connectTimeout: 10s          # 连接建立超时
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 64  # HTTP/1.1 最大等待请求
        http2MaxRequests: 100        # HTTP/2 最大并发请求
        maxRequestsPerConnection: 10 # 单连接最大请求数, 到达后关闭连接
        maxRetries: 3                # 最大重试次数
        idleTimeout: 60s             # 空闲连接超时
    outlierDetection:
      consecutive5xxErrors: 3        # 连续 3 个 5xx 即触发熔断
      interval: 15s                  # 检测间隔
      baseEjectionTime: 30s          # 基础驱逐时间（指数递增）
      maxEjectionPercent: 50         # 最多驱逐 50% 的后端实例
      minHealthPercent: 30           # 健康实例低于 30% 时停止驱逐

  subsets:
  - name: v1  # 子集名称，对应0.6B模型
    labels:
      version: v1  # 匹配Pod的version=v1标签
  - name: v2  # 子集名称，对应1.7B模型
    labels:
      version: v2  # 匹配Pod的version=v2标签