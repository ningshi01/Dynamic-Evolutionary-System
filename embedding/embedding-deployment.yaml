apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: embedding-model-cache-pvc
  namespace: act-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi # Adjust size based on your model cache needs
  # storageClassName: "your-storage-class" # Uncomment and specify if you have a specific storage class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-deployment
  namespace: act-test
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      nodeName: dell-65  # 强制指定节点为dell-65
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: embedding-model-cache-pvc
      - name: dshm
        emptyDir:
          medium: Memory
      containers:
      - name: embedding-container
        image: gpu-harbor.act.buaa.edu.cn/user-wangxi25/vllm:v0.8.5
        # ghcr.nju.edu.cn/sasha0552/vllm:latest
        # swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/vllm/vllm-openai:v0.9.1
        # docker.1ms.run/vllm/vllm-openai:latest
        args: [
          "--dtype", "float16",
          "--model", "Qwen/Qwen3-Embedding-0.6B",
          "--trust-remote-code",
          "--port", "8000"
        ]
        env:
        - name: HF_ENDPOINT
          value: "https://hf-mirror.com"
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "1"
        - name: CUDA_LAUNCH_BLOCKING
          value: "1"
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: "spawn"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        # 设置读取hf_token
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: "1" # Requesting 1 GPU
          requests:
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: cache-volume
        - mountPath: /dev/shm
          name: dshm
        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 8000
        #   initialDelaySeconds: 60
        #   periodSeconds: 15
        #   timeoutSeconds: 5
        #   failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: act-test
spec:
  selector:
    app: embedding-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000
  type: NodePort 